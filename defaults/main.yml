---
## Marzban installation directory (git clone goes here)
marzban_install_dir: /opt/marzban

## Marzban data directory (db, xray config)
marzban_data_dir: /var/lib/marzban

## SSL certificate directory
marzban_cert_dir: /var/lib/marzban/certs

## Python virtualenv directory
marzban_venv_dir: "{{ marzban_install_dir }}/venv"

## Git branch or tag to install/update to
## Pin to a specific release tag for stability (e.g. "v0.8.4")
marzban_git_version: "v0.8.4"

## Xray version to install via Xray-install script ("latest" or specific version e.g. "v1.8.11")
marzban_xray_version: "latest"

## Domain name (REQUIRED)
## Used for SSL certificate and subscription URL
marzban_domain: ""

## Email for acme.sh Let's Encrypt notifications (optional but recommended)
marzban_ssl_email: "admin@example.com"

## Marzban panel port (listens on 127.0.0.1, proxied via nginx fallback)
marzban_panel_port: 8000

## Admin credentials (REQUIRED)
## no_log: true is applied on all tasks using these
marzban_admin_username: ""
marzban_admin_password: ""

## Dashboard path
marzban_dashboard_path: "/dashboard/"

## Deploy xray_config.json with VLESS TLS + fallback to nginx
## Set to false to manage xray config manually via Marzban dashboard
marzban_xray_config_deploy: true

## Deploy nginx vhost for site (fallback from Xray)
## Requires ansible-role-nginx to be applied before this role
marzban_nginx_config_deploy: true

## XHTTP inbound port (Xray listens on 127.0.0.1 only — nginx terminates TLS on 443)
## nginx proxies XHTTP path to this port via grpc_pass
marzban_xhttp_port: 2083

## XHTTP path — must match the nginx location and client configuration
## nginx will proxy requests to this path to Xray XHTTP inbound
marzban_xhttp_path: "/xhttp"

## Nginx HTTPS port (nginx terminates TLS, proxies to Xray XHTTP and Marzban)
marzban_nginx_https_port: 443

## Nginx fallback port (legacy — kept for reference, not used in XHTTP architecture)
## In XHTTP mode nginx handles TLS directly; there is no Xray fallback to nginx.
marzban_nginx_fallback_port: 8080

## Xray log level (debug | info | warning | error | none)
marzban_xray_log_level: "warning"

## Minimum TLS version for VLESS inbound
marzban_xray_tls_min_version: "1.2"

## TLS cipher suites for VLESS inbound (empty string = Xray defaults)
marzban_xray_cipher_suites: "TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256:TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256:TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384:TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384:TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256:TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"

## Enable Xray traffic sniffing (detect HTTP/TLS destination)
## XHTTP inbound: sniffing is generally not needed (no fallback routing)
marzban_xray_sniffing_enabled: false

## Block outbound connections to private/reserved IP ranges
marzban_xray_block_private_ip: true

## Additional Xray inbounds appended after the main VLESS TLS inbound
## Format: list of YAML dicts — converted to JSON via to_json filter
## Example: VLESS WebSocket, VMess, Trojan, etc.
## Certificate paths available as shortcuts:
##   {{ marzban_cert_dir }}/{{ marzban_domain }}-fullchain.cer
##   {{ marzban_cert_dir }}/{{ marzban_domain }}.key
marzban_xray_extra_inbounds: []

## Nginx site document root (served on fallback port)
marzban_site_root: "/var/www/html"

## Nginx site log paths
marzban_site_access_log: "/var/log/nginx/marzban-access.log"
marzban_site_error_log: "/var/log/nginx/marzban-error.log"

## Add security headers to nginx site vhost (makes it look like a real site)
marzban_site_security_headers: true

## Service settings
marzban_service_name: marzban
marzban_service_enabled: true
marzban_service_state: started

## VLESS flow control — applied to all users via Marzban API
## xtls-rprx-vision: recommended for TCP+TLS (reduces double encryption overhead)
## "": disabled — required when using WebSocket or gRPC transports
marzban_user_flow: "xtls-rprx-vision"

## Host settings — configured via Marzban API after install
## Controls what appears in Host Settings UI and gets embedded in client subscription links
marzban_configure_hosts: true

## Display name in client apps (supports {USERNAME}, {PROTOCOL}, {TRANSPORT} placeholders)
marzban_host_remark: "🚀 Marz ({USERNAME}) [{PROTOCOL} - {TRANSPORT}]"

## Security layer (inbound_default | tls | none)
marzban_host_security: "inbound_default"

## ALPN — h2 for XHTTP stream-up (nginx speaks HTTP/2 to the client)
marzban_host_alpn: "h2"

## TLS fingerprint for uTLS impersonation
## (chrome | firefox | safari | ios | android | edge | 360 | qq | random | randomized | "")
marzban_host_fingerprint: "chrome"

## Marzban subscription path (must match XRAY_SUBSCRIPTION_PATH in .env)
## Used in nginx location to proxy subscription requests to Marzban
marzban_subscription_path: "sub"

## SNI value embedded in client subscription links
## " " (single space) — Marzban treats it as truthy, strips to "" in URI,
##   client falls back to using address as SNI. Real domain stays hidden.
## "" or null — Marzban falls back to reading SANs from TLS certificate,
##   exposing the real domain as sni=domain in the URI.
marzban_host_sni: " "

## Host settings for XHTTP inbound — address/port embedded in subscription links
## Port here is the external nginx port (443), not the internal Xray XHTTP port (2083)
marzban_host_xhttp_port: 443

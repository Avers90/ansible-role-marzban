---
- name: marzban | Remove legacy nginx vhost (renamed to marzban.conf)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nginx/sites-enabled/marzban
    - /etc/nginx/sites-available/marzban
  notify: Reload nginx

- name: marzban | Deploy nginx fallback vhost for decoy site
  ansible.builtin.template:
    src: marzban-nginx.conf.j2
    dest: /etc/nginx/sites-available/marzban.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: marzban | Validate nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false

- name: marzban | Enable marzban nginx vhost
  ansible.builtin.file:
    src: /etc/nginx/sites-available/marzban.conf
    dest: /etc/nginx/sites-enabled/marzban.conf
    state: link
  notify: Reload nginx

- name: marzban | Disable default nginx vhost (conflicts with fallback on port 8080)
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

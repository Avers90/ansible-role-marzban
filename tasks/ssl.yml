---
- name: marzban | Install acme.sh dependencies
  ansible.builtin.apt:
    name:
      - curl
      - cron
      - socat
    state: present

- name: marzban | Check if acme.sh is installed
  ansible.builtin.stat:
    path: /root/.acme.sh/acme.sh
  register: marzban_acme_installed

- name: marzban | Download and install acme.sh
  ansible.builtin.shell: |
    curl -s https://get.acme.sh | sh -s email={{ marzban_ssl_email }}
  args:
    creates: /root/.acme.sh/acme.sh
  when: not marzban_acme_installed.stat.exists

- name: marzban | Set default CA to Let's Encrypt
  ansible.builtin.command: /root/.acme.sh/acme.sh --set-default-ca --server letsencrypt
  changed_when: false

- name: marzban | Enable acme.sh auto-upgrade
  ansible.builtin.command: /root/.acme.sh/acme.sh --upgrade --auto-upgrade
  changed_when: false

- name: marzban | Check if certificate already exists
  ansible.builtin.stat:
    path: "{{ marzban_cert_dir }}/{{ marzban_domain }}.cer"
  register: marzban_cert_exists

- name: marzban | Issue SSL certificate via webroot (nginx must be running)
  ansible.builtin.command: >
    /root/.acme.sh/acme.sh --issue
    -d {{ marzban_domain }}
    --webroot /var/www/html
  register: marzban_acme_issue
  changed_when: "'Cert success' in marzban_acme_issue.stdout"
  failed_when: marzban_acme_issue.rc != 0 and 'Domains not changed' not in marzban_acme_issue.stdout
  when: not marzban_cert_exists.stat.exists

- name: marzban | Install SSL certificate to Marzban cert directory
  ansible.builtin.command: >
    /root/.acme.sh/acme.sh --installcert
    -d {{ marzban_domain }}
    --cert-file {{ marzban_cert_dir }}/{{ marzban_domain }}.cer
    --key-file {{ marzban_cert_dir }}/{{ marzban_domain }}.key
    --fullchain-file {{ marzban_cert_dir }}/{{ marzban_domain }}-fullchain.cer
    --reloadcmd "docker compose -f {{ marzban_install_dir }}/docker-compose.yml restart"
  register: marzban_installcert
  changed_when: "'Installing cert' in marzban_installcert.stdout"
  when: not marzban_cert_exists.stat.exists

- name: marzban | Set certificate file permissions
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ marzban_cert_dir }}/{{ marzban_domain }}.key", mode: "0600" }
    - { path: "{{ marzban_cert_dir }}/{{ marzban_domain }}.cer", mode: "0644" }
    - { path: "{{ marzban_cert_dir }}/{{ marzban_domain }}-fullchain.cer", mode: "0644" }
  loop_control:
    label: "{{ item.path }}"
  when: not marzban_cert_exists.stat.exists or marzban_acme_issue.changed | default(false)

---
- name: marzban | Fail if distro is not supported
  ansible.builtin.fail:
    msg: "Distribution '{{ ansible_facts['distribution'] }}' is not supported. Supported: Debian, Ubuntu"
  when: ansible_facts['distribution'] not in ['Debian', 'Ubuntu']

- name: marzban | Fail if domain is not set
  ansible.builtin.fail:
    msg: "marzban_domain is required. Set it in your playbook variables."
  when: marzban_domain == ""

- name: marzban | Fail if admin credentials are not set
  ansible.builtin.fail:
    msg: "marzban_admin_username and marzban_admin_password are required."
  when: marzban_admin_username == "" or marzban_admin_password == ""

- name: marzban | Install dependencies
  ansible.builtin.apt:
    name:
      - git
      - curl
      - ca-certificates
      - python3
      - python3-venv
      - cron
    state: present
    update_cache: true

- name: marzban | Check if Xray is installed
  ansible.builtin.stat:
    path: /usr/local/bin/xray
  register: marzban_xray_binary

- name: marzban | Install Xray via official install script
  ansible.builtin.shell: |
    bash -c "$(curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh)" @ install \
      {% if marzban_xray_version != 'latest' %}--version {{ marzban_xray_version }}{% endif %}
  args:
    creates: /usr/local/bin/xray
  when: not marzban_xray_binary.stat.exists

- name: marzban | Disable xray.service (Marzban manages Xray as a child process)
  ansible.builtin.systemd:
    name: xray
    enabled: false
    state: stopped
  failed_when: false

- name: marzban | Clone or update Marzban repository
  ansible.builtin.git:
    repo: "https://github.com/Gozargah/Marzban.git"
    dest: "{{ marzban_install_dir }}"
    version: "{{ marzban_git_version }}"
    force: false
  notify: Restart marzban

- name: marzban | Create data directory
  ansible.builtin.file:
    path: "{{ marzban_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: marzban | Create certificate directory
  ansible.builtin.file:
    path: "{{ marzban_cert_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: marzban | Install setuptools in virtualenv (required by apscheduler on Python 3.12)
  ansible.builtin.pip:
    name: setuptools
    virtualenv: "{{ marzban_venv_dir }}"
    virtualenv_command: python3 -m venv
    state: present

- name: marzban | Install Marzban Python requirements
  ansible.builtin.pip:
    requirements: "{{ marzban_install_dir }}/requirements.txt"
    virtualenv: "{{ marzban_venv_dir }}"
    virtualenv_command: python3 -m venv
    state: present

- name: marzban | Run database migrations
  ansible.builtin.command:
    cmd: "{{ marzban_venv_dir }}/bin/alembic upgrade head"
    chdir: "{{ marzban_install_dir }}"
  environment:
    SQLALCHEMY_DATABASE_URL: "sqlite:///{{ marzban_data_dir }}/db.sqlite3"
  changed_when: false

- name: marzban | Create marzban-cli symlink
  ansible.builtin.file:
    src: "{{ marzban_install_dir }}/marzban-cli.py"
    dest: /usr/bin/marzban-cli
    state: link

- name: marzban | Make marzban-cli executable
  ansible.builtin.file:
    path: "{{ marzban_install_dir }}/marzban-cli.py"
    mode: "0755"

- name: marzban | Deploy systemd service unit
  ansible.builtin.template:
    src: marzban.service.j2
    dest: /etc/systemd/system/marzban.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart marzban

- name: marzban | Deploy .env configuration
  ansible.builtin.template:
    src: env.j2
    dest: "{{ marzban_install_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart marzban

- name: marzban | Include SSL tasks (acme.sh + certificate issuance)
  ansible.builtin.include_tasks: ssl.yml

- name: marzban | Deploy xray_config.json
  ansible.builtin.template:
    src: xray_config.json.j2
    dest: "{{ marzban_data_dir }}/xray_config.json"
    owner: root
    group: root
    mode: "0644"
  notify: Restart marzban
  when: marzban_xray_config_deploy | bool

- name: marzban | Include nginx vhost tasks
  ansible.builtin.include_tasks: nginx.yml
  when: marzban_nginx_config_deploy | bool

- name: marzban | Enable and start Marzban service
  ansible.builtin.systemd:
    name: "{{ marzban_service_name }}"
    enabled: "{{ marzban_service_enabled }}"
    state: "{{ marzban_service_state }}"
    daemon_reload: true

- name: marzban | Wait for Marzban to be ready
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "{{ marzban_panel_port }}"
    delay: 3
    timeout: 30

- name: marzban | Obtain API token
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ marzban_panel_port }}/api/admin/token"
    method: POST
    body_format: form-urlencoded
    body:
      username: "{{ marzban_admin_username }}"
      password: "{{ marzban_admin_password }}"
    status_code: 200
  register: marzban_api_token_response
  no_log: true
  when: marzban_configure_hosts | bool or marzban_user_flow != ""

- name: marzban | Configure VLESS_TLS host settings via API
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ marzban_panel_port }}/api/hosts"
    method: PUT
    headers:
      Authorization: "Bearer {{ marzban_api_token_response.json.access_token }}"
    body_format: json
    body:
      VLESS_TCP_TLS:
        - remark: "{{ marzban_host_remark }}"
          address: "{{ marzban_domain }}"
          port: "{{ marzban_xray_port }}"
          sni: "{{ marzban_host_sni }}"
          host: null
          path: ""
          security: "{{ marzban_host_security }}"
          alpn: "{{ marzban_host_alpn }}"
          fingerprint: "{{ marzban_host_fingerprint }}"
          allowinsecure: false
          mux_enable: false
          random_user_agent: false
          use_sni_as_host: false
    status_code: 200
  no_log: true
  when: marzban_configure_hosts | bool

- name: marzban | Get list of all users for flow update
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ marzban_panel_port }}/api/users?limit=999"
    method: GET
    headers:
      Authorization: "Bearer {{ marzban_api_token_response.json.access_token }}"
    status_code: 200
  register: marzban_users_response
  no_log: true
  when: marzban_user_flow != ""

- name: marzban | Set VLESS flow for all users
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ marzban_panel_port }}/api/user/{{ item.username }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ marzban_api_token_response.json.access_token }}"
    body_format: json
    body:
      proxies:
        vless:
          id: "{{ item.proxies.vless.id }}"
          flow: "{{ marzban_user_flow }}"
    status_code: 200
  loop: "{{ marzban_users_response.json.users }}"
  loop_control:
    label: "{{ item.username }}"
  no_log: true
  when: marzban_user_flow != "" and item.proxies.vless is defined

- name: marzban | Clear API token from memory
  ansible.builtin.set_fact:
    marzban_api_token_response: null
    marzban_users_response: null
  when: marzban_configure_hosts | bool or marzban_user_flow != ""

- name: marzban | Check if admin account already exists
  ansible.builtin.command:
    cmd: "{{ marzban_venv_dir }}/bin/python marzban-cli.py admin list"
    chdir: "{{ marzban_install_dir }}"
  register: marzban_admin_list
  changed_when: false
  failed_when: false

- name: marzban | Inject SUDO credentials into .env for import-from-env
  ansible.builtin.lineinfile:
    path: "{{ marzban_install_dir }}/.env"
    regexp: "^{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
    state: present
  no_log: true
  loop:
    - { key: "SUDO_USERNAME", value: "{{ marzban_admin_username }}" }
    - { key: "SUDO_PASSWORD", value: "{{ marzban_admin_password }}" }
  when: marzban_admin_username not in (marzban_admin_list.stdout | default(''))

- name: marzban | Create sudo admin via import-from-env
  ansible.builtin.command:
    cmd: "{{ marzban_venv_dir }}/bin/python marzban-cli.py admin import-from-env --yes"
    chdir: "{{ marzban_install_dir }}"
  no_log: true
  changed_when: true
  when: marzban_admin_username not in (marzban_admin_list.stdout | default(''))

- name: marzban | Remove SUDO credentials from .env after import
  ansible.builtin.lineinfile:
    path: "{{ marzban_install_dir }}/.env"
    regexp: "^{{ item }}="
    state: absent
  loop:
    - SUDO_USERNAME
    - SUDO_PASSWORD
  when: marzban_admin_username not in (marzban_admin_list.stdout | default(''))

- name: marzban | Save credentials to file
  ansible.builtin.copy:
    content: |
      # Marzban Credentials
      # Generated: {{ ansible_facts['date_time']['iso8601'] }}
      # DELETE THIS FILE AFTER SAVING CREDENTIALS!

      Dashboard URL: https://{{ marzban_domain }}{{ marzban_dashboard_path }}
      Username: {{ marzban_admin_username }}
      Password: {{ marzban_admin_password }}
    dest: "{{ marzban_install_dir }}/credentials.txt"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: marzban | Display access information
  ansible.builtin.debug:
    msg: |
      Marzban installed successfully!

      Dashboard: https://{{ marzban_domain }}{{ marzban_dashboard_path }}

      Architecture:
        Client → :{{ marzban_xray_port }} (VLESS TLS + TCP) → Xray-core
                                                                  ↓ fallback (non-VPN traffic)
                                                        127.0.0.1:{{ marzban_nginx_fallback_port }} → nginx
                                                                    ├── /dashboard/, /api/, /sub/ → 127.0.0.1:{{ marzban_panel_port }} (Marzban)
                                                                    └── / → {{ marzban_site_root }} (decoy site)

      Credentials saved to: {{ marzban_install_dir }}/credentials.txt
      (delete after saving!)

      Useful commands:
        journalctl -u marzban -f
        journalctl -u nginx -f
        marzban-cli admin list
